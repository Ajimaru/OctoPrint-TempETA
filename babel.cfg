[python: octoprint_temp_eta/**.py]
[jinja2: octoprint_temp_eta/templates/**.jinja2]
encoding = utf-8
extensions = jinja2.ext.do
[javascript: octoprint_temp_eta/static/js/**.js]
# Space-separated keywords (Babel's documented syntax). The plugin wraps
# OctoPrint's global gettext in a _gettext helper, so user-facing strings are
# written as _gettext("…") / _ngettext("…"); without listing those the msgids
# (MQTT status text, heater labels, …) are never extracted and stay
# untranslated. ngettext takes singular at arg 1, plural at arg 2.
keywords = gettext _gettext ngettext:1,2 _ngettext:1,2
