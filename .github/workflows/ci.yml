name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  legacy-python37-check:
    # NOTE: Python 3.7 is not supported by this project anymore.
    # This job exists solely to satisfy legacy branch protection rules that
    # still expect a status check named "Test (Python 3.7)".
    name: Test (Python 3.7)
    runs-on: ubuntu-latest

    steps:
      - name: Legacy check placeholder
        run: |
          echo "Python 3.7 is no longer supported by this project."
          echo "This job is a legacy placeholder to satisfy branch protection."

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "OctoPrint"
          python -m pip install -e ".[develop]"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "18"

      - name: Install JS dependencies
        run: |
          npm ci

      - name: Fetch base branch (pull_request only)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

      - name: Run pre-commit
        run: |
          if [ ! -f ".pre-commit-config.yaml" ]; then
            echo "No .pre-commit-config.yaml found. Skipping pre-commit run."
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            pre-commit run --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD
          else
            pre-commit run --all-files
          fi

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            os: ubuntu-latest
            run-precommit: false # Modern pre-commit hooks require Python >= 3.10
            run-coverage: false
            run-build: false
          - python-version: "3.10"
            os: ubuntu-latest
            run-coverage: false
            run-build: false
          - python-version: "3.11"
            os: ubuntu-latest
            run-coverage: false
            run-build: false
          - python-version: "3.12"
            os: ubuntu-latest
            run-precommit: false
            run-coverage: true
            run-build: true
          - python-version: "3.13"
            os: ubuntu-latest
            run-precommit: false
            run-coverage: false
            run-build: false

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "OctoPrint"
          python -m pip install -e ".[develop]" build

      - name: Run tests
        if: ${{ !matrix.run-coverage }}
        run: |
          pytest -q

      - name: Run tests (with coverage)
        if: ${{ matrix.run-coverage }}
        run: |
          pytest -q --cov=octoprint_temp_eta --cov-branch --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.run-coverage && github.repository == 'Ajimaru/OctoPrint-TempETA' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage to Codacy
        if: ${{ matrix.run-coverage && github.repository == 'Ajimaru/OctoPrint-TempETA' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        env:
          CODACY_ORGANIZATION_PROVIDER: ${{ vars.CODACY_ORGANIZATION_PROVIDER }}
          CODACY_USERNAME: ${{ vars.CODACY_USERNAME }}
          CODACY_PROJECT_NAME: ${{ vars.CODACY_PROJECT_NAME }}
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: coverage.xml

      - name: Build package
        if: ${{ matrix.run-build }}
        run: |
          python -m build

  octoprint-smoke:
    name: Smoke (OctoPrint ${{ matrix.octoprint-label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - octoprint-label: "1.10.2 (minimum)"
            octoprint-source: pypi
            octoprint-spec: "OctoPrint==1.10.2"
          - octoprint-label: "devel (git dev branch)"
            octoprint-source: git
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install OctoPrint (PyPI)
        if: matrix.octoprint-source == 'pypi'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ matrix.octoprint-spec }}"

      - name: Workaround limits for OctoPrint 1.10.x
        if: matrix.octoprint-source == 'pypi' && startsWith(matrix.octoprint-spec, 'OctoPrint==1.10.')
        run: |
          python -m pip install "limits<4"

      - name: Install OctoPrint (git dev branch)
        if: matrix.octoprint-source == 'git'
        # OctoPrint's unreleased dev branch may itself be broken; don't fail
        # the run on its install issues.
        continue-on-error: ${{ matrix.experimental || false }}
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "git+https://github.com/OctoPrint/OctoPrint@dev#egg=OctoPrint"

      - name: Install plugin
        run: |
          python -m pip install .

      - name: Smoke test plugin import
        # The "devel" entry runs against OctoPrint's unreleased git dev branch,
        # which is allowed to be broken (e.g. upstream circular imports). Keep
        # that matrix entry non-blocking while the pinned minimum stays required.
        continue-on-error: ${{ matrix.experimental || false }}
        run: |
          mkdir ../smoketest
          cd ../smoketest
          python -c "import octoprint_temp_eta; print('ok')"
